name: Uber Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Setup Java
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Setup Chrome
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest

      # Run Tests
      - name: Run Selenium Tests
        run: mvn test -Dbrowser=chrome -Dheadless=true

      # Upload Extent Report
      - name: Upload Extent Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: extent-report
          path: test-output/

      # Upload Allure Results
      - name: Upload Allure Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: allure-results
          path: allure-results/

      # Upload Screenshots
      - name: Upload Screenshots
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: screenshots
          path: screenshots/